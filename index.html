<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Presentation Pro - Final Fixed Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Poppins:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: #08070b; color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Poppins', sans-serif; }
        body.white-freeze { background-color: #fff !important; }
        body.white-freeze #terminal-page, body.white-freeze #presentation-container { display: none !important; }
        
        #terminal-page { display: flex; width: 90%; max-width: 900px; height: 80vh; background-color: #0d0e15; border-radius: 12px; border: 1px solid rgba(56, 189, 248, 0.2); box-shadow: 0 20px 50px rgba(0,0,0,0.6); padding: 20px; font-family: 'Fira Code', monospace; flex-direction: column; }
        .terminal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 12px; margin-bottom: 15px; color: #38bdf8; font-size: 0.9rem; }
        .terminal-buttons { display: flex; gap: 8px; }
        .t-btn { width: 12px; height: 12px; border-radius: 50%; }
        .t-close { background-color: #ef4444; }
        .t-min { background-color: #eab308; }
        .t-max { background-color: #22c55e; }
        .terminal-body { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; font-size: 0.95rem; color: #38bdf8; }
        .terminal-input-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        .terminal-prompt { color: #22c55e; font-weight: bold; }
        #terminal-input { background: none; border: none; outline: none; color: #fff; font-family: 'Fira Code', monospace; font-size: 1.05rem; flex-grow: 1; caret-color: #22c55e; }

        #presentation-container { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: radial-gradient(circle at center, #1b1b1b 0%, #000 100%); justify-content: center; align-items: center; overflow: hidden; z-index: 10; }
        #presentation-container.hide-cursor { cursor: none; }
        #presentation-container.laser-mode { cursor: none !important; }
        #laser-dot { position: absolute; width: 12px; height: 12px; background-color: #ff0055; border-radius: 50%; pointer-events: none; z-index: 9999; box-shadow: 0 0 15px #ff0055, 0 0 30px #ff0055, 0 0 8px #fff; display: none; transform: translate(-50%, -50%); }
        #canvas-wrapper { position: relative; display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; overflow: hidden; }
        
        canvas { display: block; position: absolute; max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; opacity: 0; z-index: 5; border-radius: 10px; transform: translate3d(0,0,0) scale(0.98); contain: paint; filter: contrast(1.05) brightness(1.02); box-shadow: 0 20px 50px rgba(0,0,0,0.65); transition: opacity 0.12s ease-in-out, transform 0.12s ease-in-out; }
        canvas.active { opacity: 1; transform: translate3d(0,0,0) scale(1); }

        #slide-timer { position: absolute; top: 25px; right: 25px; width: 55px; height: 55px; background: rgba(13, 14, 21, 0.85); border: 2px solid #38bdf8; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; font-weight: 700; color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.3s ease; }
        #presentation-container.show-timer #slide-timer { opacity: 1; }

        .controls { position: absolute; bottom: 30px; display: flex; align-items: center; gap: 15px; background: rgba(255, 255, 255, 0.04); padding: 12px 25px; border-radius: 40px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); z-index: 100; opacity: 0; transform: translateY(15px); transition: opacity 0.25s ease, transform 0.25s ease; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); }
        .controls:hover { opacity: 1 !important; transform: translateY(0) !important; }
        .nav-btn { background: none; border: none; color: #e2e8f0; font-size: 1.5rem; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s, transform 0.1s; }
        .nav-btn:hover { background: rgba(255,255,255,0.1); color: #fff; transform: scale(1.05); }
        .nav-btn:disabled { color: #475569; cursor: not-allowed; }
        #page-info { font-size: 1rem; font-weight: 600; color: #cbd5e1; min-width: 90px; text-align: center; }
        .control-sep { width: 1px; height: 25px; background: rgba(255,255,255,0.15); margin: 0 5px; }
    </style>
</head>
<body>

    <div id="terminal-page">
        <div class="terminal-header">
            <div class="terminal-buttons"><span class="t-btn t-close"></span><span class="t-btn t-min"></span><span class="t-btn t-max"></span></div>
            <span>weekmotion-tech@root:~</span><span>bash</span>
        </div>
        <div class="terminal-body" id="terminal-logs">
            <div style="color: #22c55e; font-weight: bold;">[SECURE TERMINAL CONSOLE LINKED]</div>
            <div>--------------------------------------------------</div>
            <div>VIP "Weekmotion Tech" Core Engine Active. Node ready. Input command.</div><br>
        </div>
        <div class="terminal-input-row">
            <span class="terminal-prompt">root@cyberdeck:#</span>
            <input type="text" id="terminal-input" autofocus autocomplete="off">
        </div>
    </div>

    <div id="presentation-container">
        <div id="laser-dot"></div>
        <div id="canvas-wrapper">
            <div id="slide-timer">0</div>
            
            <canvas id="pdf-canvas"></canvas>

            <div class="controls" id="ui-controls">
                <button class="nav-btn" id="prev-btn" onclick="onPrevPage()">◀</button>
                <span id="page-info">Page 0 / 0</span>
                <button class="nav-btn" id="next-btn" onclick="onNextPage()">▶</button>
                <div class="control-sep"></div>
                <button class="nav-btn" title="Toggle Fullscreen" id="max-btn" onclick="toggleWindowMode()">🔲</button>
                <button class="nav-btn" title="Close Session" id="close-btn" onclick="closePresentation()" style="color: #ef4444;">❌</button>
            </div>
        </div>
    </div>

    <script>
        const pdfUrl = 'dd.pdf'; 
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let pdfDoc = null, pageNum = 1, pageRendering = false, renderTask = null;
        let canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');
        let timerInterval = null, secondsPassed = 0, mouseTimer = null, isLaserActive = false;

        window.onload = function() {
            if (localStorage.getItem("white_freeze_active") === "true") document.body.classList.add("white-freeze");
        };

        document.getElementById('terminal-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const inputElement = e.target, rawCmd = inputElement.value.trim(), cmd = rawCmd.toLowerCase();
                const logContainer = document.getElementById('terminal-logs');
                logContainer.innerHTML += `<div><span class="terminal-prompt">root@cyberdeck:#</span> ${rawCmd}</div>`;

                if (cmd === 'op') {
                    logContainer.innerHTML += `<div style="color: #22c55e">Opening Presentation...</div>`;
                    setTimeout(startPresentation, 300);
                } else if (cmd === 'pf') {
                    logContainer.innerHTML += `<div style="color: #38bdf8; margin: 5px 0;">> [GitHub]: <a href="https://github.com/shajib" target="_blank" style="color:#22c55e">github.com/shajib</a><br>> [LinkedIn]: <a href="https://linkedin.com/in/shajib" target="_blank" style="color:#22c55e">linkedin.com/in/shajib</a></div>`;
                } else if (cmd === 'ab') {
                    logContainer.innerHTML += `<div style="color: #eab308; margin: 5px 0;">Project: CyberDeck Custom Slide Framework v5.0<br>Developer: Shajib & Gemini AI Collaborator</div>`;
                } else if (cmd === 'wt') {
                    logContainer.innerHTML += `<div style="color: #ef4444">Executing emergency freeze...</div>`;
                    setTimeout(() => { localStorage.setItem("white_freeze_active", "true"); document.body.classList.add("white-freeze"); }, 400);
                } else if (cmd === 'clear') { logContainer.innerHTML = ''; }
                else if (cmd !== "") { logContainer.innerHTML += `<div style="color: #ef4444">bash: command not found: '${rawCmd}'</div>`; }
                inputElement.value = ''; logContainer.scrollTop = logContainer.scrollHeight;
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F11' && localStorage.getItem("white_freeze_active") === "true") {
                e.preventDefault(); localStorage.removeItem("white_freeze_active");
                document.body.classList.remove("white-freeze");
                setTimeout(() => document.getElementById('terminal-input').focus(), 100);
            }
        });

        function resetTimer() {
            clearInterval(timerInterval); secondsPassed = 0;
            document.getElementById('slide-timer').textContent = secondsPassed;
            timerInterval = setInterval(() => { secondsPassed++; document.getElementById('slide-timer').textContent = secondsPassed; }, 1000);
        }

        function loadPdf() {
            pdfjsLib.getDocument(pdfUrl).promise.then(function(pdfDoc_) {
                pdfDoc = pdfDoc_; pageNum = 1; renderPage(pageNum);
            }).catch(error => { alert("Error: 'dd.pdf' not found!"); closePresentation(); });
        }

        // PURE PINE-SHARP & ULTRA COMPACT RENDER CORE
        function renderPage(num) {
            pageRendering = true;
            if (renderTask) renderTask.cancel();

            const scale = Math.min(window.innerWidth / 500, 4);
            const outputScale = Math.min(window.devicePixelRatio || 1, 2);

            pdfDoc.getPage(num).then(function(page) {
                const viewport = page.getViewport({ scale: scale });
                canvas.width = viewport.width * outputScale;
                canvas.height = viewport.height * outputScale;
                canvas.style.width = viewport.width + "px";
                canvas.style.height = viewport.height + "px";

                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.setTransform(outputScale, 0, 0, outputScale, 0, 0);
                ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = "high";

                const renderContext = { canvasContext: ctx, viewport: viewport, enableWebGL: true, intent: "display" };
                renderTask = page.render(renderContext);

                renderTask.promise.then(function() {
                    requestAnimationFrame(() => {
                        pageRendering = false; renderTask = null;
                        canvas.classList.add('active'); resetTimer();
                    });
                }).catch(err => { if (err.name !== 'RenderingCancelledException') console.error(err); });
            });
            updateDOMInfo(num);
        }

        function changePage(num) {
            canvas.classList.remove('active'); 
            setTimeout(() => { renderPage(num); }, 120);
        }

        // 100% RELIABLE ACCURATE COUNTER SYNC
        function updateDOMInfo(num) {
            document.getElementById('page-info').textContent = `Page ${num} / ${pdfDoc ? pdfDoc.numPages : 0}`;
            document.getElementById('prev-btn').disabled = (num <= 1);
            document.getElementById('next-btn').disabled = (pdfDoc ? num >= pdfDoc.numPages : true);
        }

        function onNextPage() { if (pageRendering || !pdfDoc) return; if (pageNum < pdfDoc.numPages) { pageNum++; changePage(pageNum); } }
        function onPrevPage() { if (pageRendering || !pdfDoc) return; if (pageNum > 1) { pageNum--; changePage(pageNum); } }

        function startPresentation() {
            const container = document.getElementById('presentation-container');
            container.style.display = 'flex'; document.getElementById('terminal-page').style.display = 'none';
            enterFullscreen(); initPresentationUIControls();
            if (!pdfDoc) loadPdf(); else renderPage(pageNum);
        }

        function enterFullscreen() {
            const container = document.getElementById('presentation-container');
            if (container.requestFullscreen) container.requestFullscreen();
            else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        }

        document.getElementById('ui-controls').addEventListener('click', function(e) { e.stopPropagation(); });

        function exitFullscreen() {
            if (document.fullscreenElement || document.webkitIsFullScreen) {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }
        function toggleWindowMode() {
            if (document.fullscreenElement || document.webkitIsFullScreen) exitFullscreen(); else enterFullscreen();
        }

        function closePresentation() {
            clearInterval(timerInterval); clearTimeout(mouseTimer); if (renderTask) renderTask.cancel();
            const container = document.getElementById('presentation-container');
            container.removeEventListener('mousemove', onMouseActivity);
            container.removeEventListener('mousemove', updateLaserPointer);
            container.classList.remove('hide-cursor', 'show-timer', 'laser-mode');
            document.getElementById('laser-dot').style.display = 'none';
            isLaserActive = false; exitFullscreen();

            container.style.display = 'none'; document.getElementById('terminal-page').style.display = 'flex';
            canvas.classList.remove('active'); pageNum = 1; document.getElementById('terminal-input').focus();
        }

        function initPresentationUIControls() {
            const container = document.getElementById('presentation-container');
            container.addEventListener('mousemove', onMouseActivity); resetMouseTimer();
        }
        function onMouseActivity() {
            const container = document.getElementById('presentation-container');
            if(!isLaserActive) container.classList.remove('hide-cursor');
            container.classList.add('show-timer'); resetMouseTimer();
        }
        function resetMouseTimer() {
            clearTimeout(mouseTimer);
            mouseTimer = setTimeout(() => {
                const container = document.getElementById('presentation-container');
                if(!isLaserActive) container.classList.add('hide-cursor');
                container.classList.remove('show-timer');
            }, 2000);
        }

        function updateLaserPointer(e) {
            const laserDot = document.getElementById('laser-dot');
            laserDot.style.left = e.clientX + 'px'; laserDot.style.top = e.clientY + 'px';
        }

        // STRICT NAVIGATION INTERCEPTOR (Prevents Double Fires)
        document.addEventListener('keydown', function(e) {
            const container = document.getElementById('presentation-container');
            if (container.style.display === 'flex') {
                onMouseActivity();
                if (e.key === 'l' || e.key === 'L') {
                    isLaserActive = !isLaserActive;
                    const laserDot = document.getElementById('laser-dot');
                    if (isLaserActive) {
                        container.classList.add('laser-mode'); laserDot.style.display = 'block';
                        container.addEventListener('mousemove', updateLaserPointer);
                    } else {
                        container.classList.remove('laser-mode'); laserDot.style.display = 'none';
                        container.removeEventListener('mousemove', updateLaserPointer);
                    }
                }
                
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
                    e.preventDefault(); onNextPage();
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    e.preventDefault(); onPrevPage();
                }
            }
        });

        document.getElementById('canvas-wrapper').addEventListener('click', function(e) {
            if (document.getElementById('presentation-container').style.display === 'flex' && !e.target.closest('.controls')) {
                onNextPage();
            }
        });

        function exitFullscreenHandler() {
            const isPresentationOpen = document.getElementById('presentation-container').style.display === 'flex';
            if (!document.fullscreenElement && !document.webkitIsFullScreen) {
                if (isPresentationOpen) clearInterval(timerInterval);
            } else {
                if (isPresentationOpen && pdfDoc) resetTimer();
            }
        }
        document.addEventListener('fullscreenchange', exitFullscreenHandler);
        document.addEventListener('webkitfullscreenchange', exitFullscreenHandler);
    </script>
</body>
</html>
